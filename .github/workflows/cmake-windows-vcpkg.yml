name: Windows CMake + vcpkg

# Builds xLights with CMake + vcpkg (XLIGHTS_USE_VCPKG=ON).
# vcpkg installed packages are cached in actions/cache keyed on the
# package list hash — on a cache hit the install step is skipped entirely.
# sccache caches compiled object files across runs for fast incremental builds.
#
# FFmpeg is installed with a CI-safe feature set (no CUDA/OpenCL/QSV):
# those GPU-acceleration features require external SDKs not present on
# standard GitHub-hosted runners. Add a CUDA install step and expand
# the feature list if a GPU-enabled runner is available.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cmake-vcpkg:
    name: CMake / vcpkg / Windows x64
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      BUILD_DIR: cmake_vs_vcpkg
      SCCACHE_GHA_ENABLED: "true"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── MSVC ──────────────────────────────────────────────────────────────
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── ISPC ──────────────────────────────────────────────────────────────
      - name: Install ISPC
        uses: ispc/install-ispc-action@main
        with:
          version: 1.30.0

      # ── sccache ───────────────────────────────────────────────────────────
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        shell: bash
        run: |
          if ! sccache --zero-stats; then
            echo "::warning::sccache GHA backend unavailable; falling back to local disk"
            echo "SCCACHE_GHA_ENABLED=" >> "$GITHUB_ENV"
            sccache --stop-server 2>/dev/null || true
          fi

      - name: Create sccache cl.bat shim
        shell: pwsh
        run: |
          $dir = "${{ runner.temp }}\sccache-wrapper"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          @'
          @echo off
          sccache.exe cl.exe %* 2>&1
          set RC=%ERRORLEVEL%
          if not "%RC%"=="0" echo cl.bat FAILED (rc=%RC%) args: %* 1>&2
          exit /b %RC%
          '@ | Set-Content -Encoding Ascii "$dir\cl.bat"
          "SCCACHE_WRAPPER_DIR=$dir" | Out-File $env:GITHUB_ENV -Append

      # ── vcpkg bootstrap ───────────────────────────────────────────────────
      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkg = "C:\vcpkg"
          if (-not (Test-Path "$vcpkg\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg $vcpkg --depth 1
          }
          & "$vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$vcpkg" | Out-File $env:GITHUB_ENV -Append

      # ── vcpkg installed-package cache ─────────────────────────────────────
      # Cache the entire installed/ tree so subsequent runs skip compilation
      # AND extraction. Key on this workflow file — any package list change
      # bumps the key and triggers a fresh install.
      - name: Cache vcpkg installed packages
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-${{ hashFiles('.github/workflows/cmake-windows-vcpkg.yml') }}

      # ── Install packages (cache miss only) ────────────────────────────────
      # --classic forces classic mode so individual package arguments are
      # accepted even though a vcpkg.json exists in the repo root.
      # Vulkan is available on the runner; CUDA/OpenCL/QSV are excluded.
      - name: Install vcpkg packages
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $packages = @(
            "ffmpeg[core,avcodec,avdevice,avfilter,avformat,swresample,swscale,gpl,x264,x265,vulkan]:x64-windows",
            "sdl2:x64-windows",
            "zstd:x64-windows",
            "curl[core]:x64-windows",
            "zlib:x64-windows",
            "hidapi:x64-windows",
            "libxlsxwriter:x64-windows",
            "libwebp:x64-windows"
          )
          # --classic forces classic mode so individual package arguments
          # are accepted even though a vcpkg.json exists in the repo root.
          & "$env:VCPKG_ROOT\vcpkg.exe" install @packages `
            --classic `
            --no-print-usage `
            --triplet x64-windows

      # ── wxWidgets ─────────────────────────────────────────────────────────
      - name: Get wxWidgets HEAD SHA
        id: wx-sha
        shell: bash
        run: |
          sha=$(git ls-remote https://github.com/xLightsSequencer/wxWidgets.git HEAD \
                | cut -f1 | head -c 12)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache wxWidgets
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\wxWidgets
          key: wxwidgets-msvc2022-x64-vcpkg-${{ steps.wx-sha.outputs.sha }}

      - name: Checkout wxWidgets
        if: steps.cache-wx.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: xLightsSequencer/wxWidgets
          path: wxWidgets
          submodules: recursive

      - name: Build wxWidgets (Release)
        if: steps.cache-wx.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}\wxWidgets
        run: msbuild /m .\build\msw\wx_vc17.sln /p:Configuration="Release" /p:Platform="x64"

      # ── Configure ─────────────────────────────────────────────────────────
      # VCPKG_MANIFEST_INSTALL=OFF prevents cmake's toolchain from running its
      # own vcpkg install during configure (packages are already installed above).
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S . -B %BUILD_DIR% ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DVCPKG_MANIFEST_INSTALL=OFF ^
            -DXLIGHTS_USE_VCPKG=ON ^
            -DwxWidgets_ROOT_DIR=${{ github.workspace }}\wxWidgets

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        shell: cmd
        run: |
          cmake --build %BUILD_DIR% --config Release --parallel 8 ^
            -- ^
            /p:CLToolExe=cl.bat ^
            /p:CLToolPath=%SCCACHE_WRAPPER_DIR% ^
            /p:TrackFileAccess=false ^
            /p:UseMultiToolTask=true

      - name: sccache stats
        run: sccache --show-stats

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload xLights exe
        uses: actions/upload-artifact@v4
        with:
          name: xLights_vcpkg_exe
          path: bin\Release\**
          retention-days: 7
