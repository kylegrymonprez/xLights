name: Windows CMake + vcpkg

# Builds xLights with CMake + vcpkg (XLIGHTS_USE_VCPKG=ON).
# All vcpkg-compiled binaries are cached via the GitHub Actions cache
# provider so subsequent runs skip recompilation of unchanged packages.
#
# FFmpeg is installed with a CI-safe feature set (no CUDA/OpenCL/QSV):
# those GPU-acceleration features require external SDKs not present on
# standard GitHub-hosted runners. Add a CUDA install step and expand
# the feature list if a GPU-enabled runner is available.

on:

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cmake-vcpkg:
    name: CMake / vcpkg / Windows x64
    runs-on: windows-latest

    env:
      # GitHub Actions cache backend for vcpkg binary caching.
      # ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN are exported below.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_DEFAULT_TRIPLET: x64-windows
      BUILD_DIR: cmake_vs_vcpkg

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── MSVC ──────────────────────────────────────────────────────────────
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── ISPC ──────────────────────────────────────────────────────────────
      - name: Install ISPC
        uses: ispc/install-ispc-action@main
        with:
          version: 1.30.0

      # ── vcpkg binary cache ─────────────────────────────────────────────────
      # The x-gha provider needs these two vars from the runner environment.
      - name: Export GHA cache tokens for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',
              process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN',
              process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── vcpkg bootstrap ────────────────────────────────────────────────────
      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkg = "C:\vcpkg"
          if (-not (Test-Path "$vcpkg\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg $vcpkg --depth 1
          }
          & "$vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$vcpkg" | Out-File $env:GITHUB_ENV -Append

      # ── Install packages ───────────────────────────────────────────────────
      # Explicit package list rather than manifest mode so we can control
      # FFmpeg features. Vulkan is available on the runner (VulkanSDK is
      # pre-installed); CUDA/OpenCL/QSV are excluded — add them if the
      # runner is upgraded to a GPU-enabled image.
      - name: Install vcpkg packages
        shell: pwsh
        run: |
          $packages = @(
            "ffmpeg[core,avcodec,avdevice,avfilter,avformat,swresample,swscale,gpl,x264,x265,vulkan]:x64-windows",
            "sdl2:x64-windows",
            "zstd:x64-windows",
            "curl[core]:x64-windows",
            "zlib:x64-windows",
            "hidapi:x64-windows",
            "libxlsxwriter:x64-windows",
            "libwebp:x64-windows"
          )
          & "$env:VCPKG_ROOT\vcpkg.exe" install @packages `
            --no-print-usage `
            --triplet x64-windows

      # ── wxWidgets ──────────────────────────────────────────────────────────
      - name: Get wxWidgets HEAD SHA
        id: wx-sha
        shell: bash
        run: |
          sha=$(git ls-remote https://github.com/xLightsSequencer/wxWidgets.git HEAD \
                | cut -f1 | head -c 12)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache wxWidgets
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\wxWidgets
          key: wxwidgets-msvc2022-x64-vcpkg-${{ steps.wx-sha.outputs.sha }}

      - name: Checkout wxWidgets
        if: steps.cache-wx.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: xLightsSequencer/wxWidgets
          path: wxWidgets
          submodules: recursive

      - name: Build wxWidgets (Release)
        if: steps.cache-wx.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}\wxWidgets
        run: msbuild /m .\build\msw\wx_vc17.sln /p:Configuration="Release" /p:Platform="x64"

      # ── Configure ──────────────────────────────────────────────────────────
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S . -B %BUILD_DIR% ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DXLIGHTS_USE_VCPKG=ON ^
            -DwxWidgets_ROOT_DIR=${{ github.workspace }}\wxWidgets

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        shell: cmd
        run: cmake --build %BUILD_DIR% --config Release --parallel 8

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload xLights exe
        uses: actions/upload-artifact@v4
        with:
          name: xLights_vcpkg_exe
          path: bin\Release\**
          retention-days: 7
