name: Windows CMake

on:
  schedule:
    - cron: '0 5 * * *' # run at 5 AM UTC
  workflow_dispatch:

jobs:
  cmake-windows:
    name: CMake / Windows / MSVC x64
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── MSVC environment ──────────────────────────────────────────────────
      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v3

      # ── wxWidgets (custom fork, built with nmake → lib/vc_x64_lib layout) ─
      - name: Get wxWidgets HEAD SHA
        id: wx-sha
        shell: bash
        run: |
          sha=$(git ls-remote https://github.com/xLightsSequencer/wxWidgets.git HEAD \
                | cut -f1 | head -c 12)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache wxWidgets
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\wxWidgets
          key: wxwidgets-msvc2022-x64-${{ steps.wx-sha.outputs.sha }}

      - name: Checkout wxWidgets
        if: steps.cache-wx.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: xLightsSequencer/wxWidgets
          path: wxWidgets          # relative → resolves to ${{ github.workspace }}\wxWidgets
          submodules: recursive

      - name: Build wxWidgets (Release)
        if: steps.cache-wx.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}\wxWidgets
        run: msbuild /m .\build\msw\wx_vc17.sln /p:Configuration="Release" /p:Platform="x64"

      # ── ISPC ──────────────────────────────────────────────────────────────
      - name: install ISPC
        uses: ispc/install-ispc-action@main
        with:
          version: 1.30.0

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure
        shell: cmd
        run: |
          cmake -S . -B cmake_vs ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DwxWidgets_ROOT_DIR=${{ github.workspace }}\wxWidgets

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        shell: cmd
        run: cmake --build cmake_vs --config Release --parallel 8
